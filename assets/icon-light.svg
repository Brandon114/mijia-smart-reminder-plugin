<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-light" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 背景圆形（暖色调） -->
  <circle cx="50" cy="50" r="45" fill="url(#gradient-light)" filter="url(#shadow-light)"/>
  
  <!-- 外圆环 -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.4"/>
  
  <!-- 小爱音箱主体 -->
  <ellipse cx="50" cy="50" rx="25" ry="20" fill="#FFFFFF" fill-opacity="0.95"/>
  
  <!-- 音箱网格 -->
  <rect x="35" y="45" width="30" height="10" rx="2" fill="#F5F5F5" fill-opacity="0.9"/>
  
  <!-- 网格线（水平） -->
  <line x1="35" y1="47" x2="65" y2="47" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="35" y1="49" x2="65" y2="49" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="35" y1="51" x2="65" y2="51" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="35" y1="53" x2="65" y2="53" stroke="#CCCCCC" stroke-width="0.5"/>
  
  <!-- 网格线（垂直） -->
  <line x1="40" y1="45" x2="40" y2="55" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="45" y1="45" x2="45" y2="55" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="50" y1="45" x2="50" y2="55" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="55" y1="45" x2="55" y2="55" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="60" y1="45" x2="60" y2="55" stroke="#CCCCCC" stroke-width="0.5"/>
  
  <!-- 声音波纹（暖色调） -->
  <path d="M 20,50 Q 30,45 40,50" stroke="#FF9A3C" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M 60,50 Q 70,55 80,50" stroke="#FF9A3C" stroke-width="2" fill="none" opacity="0.8"/>
  
  <!-- 时钟图标（表示提醒，亮色） -->
  <circle cx="50" cy="30" r="8" fill="#4ECDC4" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="50" y1="30" x2="50" y2="26" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="30" x2="53" y2="30" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>
  
  <!-- 铃铛图标（表示提醒，亮色） -->
  <path d="M 50,70 
           C 45,70 42,65 42,60 
           L 58,60 
           C 58,65 55,70 50,70 
           Z" 
        fill="#FFD166" stroke="#FFC145" stroke-width="1"/>
  <circle cx="50" cy="62" r="2" fill="#FFC145"/>
  <line x1="50" y1="70" x2="50" y2="75" stroke="#FFC145" stroke-width="1"/>
  
  <!-- 音量图标 -->
  <path d="M 30,35 L 30,45 M 30,40 L 33,37 M 30,40 L 33,43" 
        stroke="#FF9A3C" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  
  <!-- 麦克风图标 -->
  <path d="M 70,35 L 70,45 M 67,38 L 73,38" 
        stroke="#4ECDC4" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  
  <!-- 插件名称（亮色主题） -->
  <text x="50" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" font-weight="bold">
    Mijia
  </text>
  
  <!-- 点缀小点 -->
  <circle cx="35" cy="30" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="65" cy="30" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="40" cy="70" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="60" cy="70" r="2" fill="#FFFFFF" opacity="0.6"/>
</svg>