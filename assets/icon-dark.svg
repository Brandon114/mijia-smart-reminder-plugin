<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-dark" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="45" fill="url(#gradient-dark)" filter="url(#shadow-dark)"/>
  
  <!-- 外圆环 -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#2C3E50" stroke-width="2" stroke-opacity="0.3"/>
  
  <!-- 小爱音箱主体 -->
  <ellipse cx="50" cy="50" rx="25" ry="20" fill="#FFFFFF" fill-opacity="0.9"/>
  
  <!-- 音箱网格 -->
  <rect x="35" y="45" width="30" height="10" rx="2" fill="#E0E0E0" fill-opacity="0.7"/>
  
  <!-- 网格线（水平） -->
  <line x1="35" y1="47" x2="65" y2="47" stroke="#B0B0B0" stroke-width="0.5"/>
  <line x1="35" y1="49" x2="65" y2="49" stroke="#B0B0B0" stroke-width="0.5"/>
  <line x1="35" y1="51" x2="65" y2="51" stroke="#B0B0B0" stroke-width="0.5"/>
  <line x1="35" y1="53" x2="65" y2="53" stroke="#B0B0B0" stroke-width="0.5"/>
  
  <!-- 网格线（垂直） -->
  <line x1="40" y1="45" x2="40" y2="55" stroke="#B0B0B0" stroke-width="0.5"/>
  <line x1="45" y1="45" x2="45" y2="55" stroke="#B0B0B0" stroke-width="0.5"/>
  <line x1="50" y1="45" x2="50" y2="55" stroke="#B0B0B0" stroke-width="0.5"/>
  <line x1="55" y1="45" x2="55" y2="55" stroke="#B0B0B0" stroke-width="0.5"/>
  <line x1="60" y1="45" x2="60" y2="55" stroke="#B0B0B0" stroke-width="0.5"/>
  
  <!-- 声音波纹 -->
  <path d="M 20,50 Q 30,45 40,50" stroke="#4A90E2" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 60,50 Q 70,55 80,50" stroke="#4A90E2" stroke-width="2" fill="none" opacity="0.7"/>
  
  <!-- 时钟图标（表示提醒） -->
  <circle cx="50" cy="30" r="8" fill="#FF6B6B" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="50" y1="30" x2="50" y2="26" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="30" x2="53" y2="30" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>
  
  <!-- 铃铛图标（表示提醒） -->
  <path d="M 50,70 
           C 45,70 42,65 42,60 
           L 58,60 
           C 58,65 55,70 50,70 
           Z" 
        fill="#FFD166" stroke="#E6B450" stroke-width="1"/>
  <circle cx="50" cy="62" r="2" fill="#E6B450"/>
  <line x1="50" y1="70" x2="50" y2="75" stroke="#E6B450" stroke-width="1"/>
  
  <!-- 插件名称 -->
  <text x="50" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" font-weight="bold">
    Mijia
  </text>
</svg>